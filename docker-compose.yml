# Nginx image is built from repo root (nginx/Dockerfile) and includes the frontend dist/.
# Rebuild with: docker compose build --no-cache nginx
services:
  backend:
    env_file: .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    # No host ports: Dokploy/Traefik already binds :80; route the domain to this service in Dokploy.
    expose:
      - "80"
    depends_on:
      - backend
